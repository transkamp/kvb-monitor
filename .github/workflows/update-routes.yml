name: Update KVB Routes

on:
  schedule:
    # Weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-routes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch KVB routes
        run: npx tsx scripts/fetch-kvb-routes.ts

      - name: Commit changes
        if: hashFile('lib/data/kvb-routes.json') != ''
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add lib/data/kvb-routes.json
          git diff --staged --quiet || git commit -m "Update KVB routes (weekly)"
          git push